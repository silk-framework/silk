name: Test

on:
  push:
    branches: [ develop, master ]
  pull_request:
    branches: [ develop, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'sbt'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '14.17.0'
        cache: 'yarn'

    - name: Install Node dependencies
      run: yarn install

    - name: Run tests
      run: sbt test

    - name: Cache SBT
      uses: actions/cache@v4
      with:
        path: |
          ~/.sbt
          ~/.ivy2/cache
        key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', '**/build.properties', '**/plugins.sbt') }}
        restore-keys: |
          ${{ runner.os }}-sbt-
